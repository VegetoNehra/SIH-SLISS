<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLISS</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #0b0c2a;
        color: #e5e7eb;
      }
      .logo {
        height: 50px;
        width: auto;
        display: block;
        transition: transform 0.3s ease, filter 0.3s ease;
        cursor: pointer;
      }
      .logo:hover {
        transform: scale(1.1);
        filter: brightness(1.2);
      }
      .icon-card {
        width: 260px;
        height: 170px;
        background-color: #1f213f;
        border: 1px solid #2a2d56;
        border-radius: 1rem;
        transition: all 0.3s ease;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 12px;
      }
      .icon-card:hover {
        transform: scale(1.08);
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
      }
      .icon-gradient {
        padding: 1rem;
        border-radius: 50%;
        transition: transform 0.5s ease-in-out;
      }
      .icon-card:hover .icon-gradient {
        transform: rotate(360deg);
      }
    </style>
  </head>
  <body class="text-gray-200 flex flex-col min-h-screen">
    <!-- Navbar -->
    <header class="navbar flex items-center justify-between px-10 py-4 bg-[#131432] sticky top-0 z-50">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="SLISS Logo" class="logo" />
        <span class="brand-text text-xl font-semibold">SLISS</span>
      </div>
      <nav class="flex gap-4">
        <a href="index.html" class="px-5 py-2 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 font-medium">Home</a>
        <a href="about.html" class="px-5 py-2 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 font-medium">About</a>
      </nav>
    </header>

    <!-- Main -->
    <main class="container mx-auto p-6 flex-grow">
      <div class="flex flex-wrap justify-center gap-6">
        
        <!-- Official Detail -->
        <a href="officialdetails.html" class="icon-card">
          <div class="icon-gradient bg-gradient-to-r from-indigo-500 to-purple-500">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"></path>
            </svg>
          </div>
          <span class="text-lg font-medium">Official Detail</span>
        </a>

        <!-- Bulletin Board -->
        <a href="bulletinboard.html" class="icon-card">

            <svg class="w-10 h-10 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="14" rx="2" ry="2"></rect>
              <line x1="3" y1="10" x2="21" y2="10"></line>
              <line x1="8" y1="20" x2="16" y2="20"></line>
            </svg>
          </div>
          <span class="text-lg font-medium">Bulletin Board</span>
        </a>

        <!-- Student Leave -->
        <a href="student-leave.html" class="icon-card">

        <!-- Exam Results -->

            <svg class="w-10 h-10 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="4" y="3" width="14" height="18" rx="2" ry="2"></rect>
              <line x1="7" y1="7" x2="15" y2="7"></line>
              <line x1="7" y1="11" x2="15" y2="11"></line>
              <line x1="7" y1="15" x2="11" y2="15"></line>
              <circle cx="18" cy="8" r="2"></circle>
              <path d="M17 10l-1 3m3-3l1 3"></path>

          </div>

        <!-- Fee Payment -->

              <rect x="3" y="6" width="18" height="12" rx="2" ry="2"></rect>

            </svg>
          </div>
          <span class="text-lg font-medium">Fee Payment</span>
        </a>

        <!-- Attendance -->
        <a href="attendance.html" class="icon-card">

        <!-- Mental Health Support -->
        <a href="mentalsupport.html" class="icon-card">
